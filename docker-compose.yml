services:
  gateway:
    image: nginx:1.27-alpine
    container_name: gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - auth-service
      - product-service
      - order-service
      - user-service
      - chat-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  auth-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: auth-service
    command: ["/app/bin/auth-service"]
    environment:
      - BACKEND_PORT=8082
      - MONGODB_URI=mongodb://mongo:27017
      - JWT_SECRET=dev_secret_change_me
      - FRONTEND_ORIGIN=*
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  product-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: product-service
    command: ["/app/bin/product-service"]
    environment:
      - BACKEND_PORT=8083
      - MONGODB_URI=mongodb://mongo:27017
      - JWT_SECRET=dev_secret_change_me
      - FRONTEND_ORIGIN=*
    depends_on:
      - mongo
    volumes:
      - product-images:/app/static/assets/products
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  order-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: order-service
    command: ["/app/bin/order-service"]
    environment:
      - BACKEND_PORT=8084
      - MONGODB_URI=mongodb://mongo:27017
      - JWT_SECRET=dev_secret_change_me
      - FRONTEND_ORIGIN=*
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  user-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: user-service
    command: ["/app/bin/user-service"]
    environment:
      - BACKEND_PORT=8085
      - MONGODB_URI=mongodb://mongo:27017
      - JWT_SECRET=dev_secret_change_me
      - FRONTEND_ORIGIN=*
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  chat-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chat-service
    command: ["/app/bin/chat-service"]
    environment:
      - BACKEND_PORT=8086
      - JWT_SECRET=dev_secret_change_me
      - FRONTEND_ORIGIN=*
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend
    ports:
      - "8081:8081"
    environment:
      - FRONTEND_PORT=8081
      - AUTH_SERVICE_URL=http://auth-service:8082
      - PRODUCT_SERVICE_URL=http://product-service:8083
      - ORDER_SERVICE_URL=http://order-service:8084
      - USER_SERVICE_URL=http://user-service:8085
      - CHAT_SERVICE_URL=http://chat-service:8086
      - ANALYTICS_SERVICE_URL=http://order-service:8084
      - JWT_SECRET=dev_secret_change_me
    depends_on:
      - auth-service
      - product-service
      - order-service
      - user-service
      - chat-service
    volumes:
      - product-images:/app/static/assets/products
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  mongo:
    image: mongo:6
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=clothes_store
      - POSTGRES_USER=clothes
      - POSTGRES_PASSWORD=clothes_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts.yml:/etc/prometheus/alerts.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - frontend
      - auth-service
      - product-service
      - order-service
      - user-service
      - chat-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  grafana-data:
  mongo-data:
  postgres-data:
  product-images:
