name: Team-3 CI/CD

on:
  push:
    branches: ["team-3"]
  workflow_dispatch:

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: ci
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
      REPO_URL: https://github.com/Greatjobson/sre-final.git
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          pip3 install ansible-core

      - name: Generate inventory for deployment host
        run: |
          cat > ansible/inventory.ci.ini <<EOF
          [sre_nodes]
          sre-vm ansible_host=${DEPLOY_HOST} ansible_user=${DEPLOY_USER} ansible_ssh_private_key_file=~/.ssh/id_ed25519

          [sre_nodes:vars]
          ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Provision/update host with Ansible
        run: |
          ansible -i ansible/inventory.ci.ini all -m ping
          ansible-playbook -i ansible/inventory.ci.ini ansible/playbook.yml \
            -e repo_url="${REPO_URL}" \
            -e repo_version="team-3"

      - name: Deploy branch team-3 over SSH (pull + scripts + make + k8s)
        run: |
          APP_DIR="${DEPLOY_APP_DIR:-/opt/clothes-store}"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "APP_DIR='${APP_DIR}' bash '${APP_DIR}/scripts/deploy-team3.sh' team-3"
