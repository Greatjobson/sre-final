name: Team-3 CI/CD

on:
  push:
    branches: ["team-3"]
  workflow_dispatch:

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: ci

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
      REPO_URL: https://github.com/${{ github.repository }}.git

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_USER:?DEPLOY_USER is required}"
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY is required}"

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh

          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

      - name: Deploy via SSH
        run: |
          set -euo pipefail
          APP_DIR="${DEPLOY_APP_DIR:-/opt/clothes-store}"
          REPO_URL="${REPO_URL}"

          ssh \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" "export APP_DIR='$APP_DIR' REPO_URL='$REPO_URL'; bash -se" << 'EOF'

            set -euo pipefail

            if [ ! -d "$APP_DIR" ]; then
              echo "==> Creating app directory: $APP_DIR"
              sudo mkdir -p "$APP_DIR"
              sudo chown "$USER:$USER" "$APP_DIR"
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "==> Cloning repository into $APP_DIR"
              git clone --branch team-3 --single-branch "$REPO_URL" "$APP_DIR"
            fi

            echo "==> Fixing repository permissions"
            sudo chown -R "$USER:$USER" "$APP_DIR"

            cd "$APP_DIR"

            echo "==> Git update"
            git fetch --prune origin
            git checkout team-3
            git pull --ff-only origin team-3

            echo "==> Build Docker images"
            sudo docker compose build \
              auth-service \
              product-service \
              order-service \
              user-service \
              chat-service \
              notification-service \
              frontend

            echo "==> Import images into k3s/containerd"

            for img in \
              clothes-store-auth-service:latest \
              clothes-store-product-service:latest \
              clothes-store-order-service:latest \
              clothes-store-user-service:latest \
              clothes-store-chat-service:latest \
              clothes-store-notification-service:latest \
              clothes-store-frontend:latest; do

              echo "Importing $img"

              f="/tmp/${img//[:\/]/_}.tar"

              sudo docker save "$img" -o "$f"

              sudo ctr -n k8s.io images import "$f"

              rm -f "$f"

            done

            echo "==> Apply Kubernetes manifests"
            kubectl apply -f k8s/namespace.yaml
            kubectl apply -f k8s/app-stack.yaml
            kubectl apply -f k8s/monitoring.yaml

            echo "==> Restart deployments"

            kubectl rollout restart deployment/auth-service -n clothes-store
            kubectl rollout restart deployment/product-service -n clothes-store
            kubectl rollout restart deployment/order-service -n clothes-store
            kubectl rollout restart deployment/user-service -n clothes-store
            kubectl rollout restart deployment/chat-service -n clothes-store
            kubectl rollout restart deployment/notification-service -n clothes-store
            kubectl rollout restart deployment/frontend -n clothes-store

            echo "==> Waiting for rollout"

            kubectl rollout status deployment/auth-service -n clothes-store --timeout=180s
            kubectl rollout status deployment/product-service -n clothes-store --timeout=180s
            kubectl rollout status deployment/order-service -n clothes-store --timeout=180s
            kubectl rollout status deployment/user-service -n clothes-store --timeout=180s
            kubectl rollout status deployment/chat-service -n clothes-store --timeout=180s
            kubectl rollout status deployment/notification-service -n clothes-store --timeout=180s
            kubectl rollout status deployment/frontend -n clothes-store --timeout=180s

            echo "==> Current pods"

            kubectl get pods -n clothes-store

          EOF