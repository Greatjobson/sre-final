name: Team-3 CI/CD

on:
  push:
    branches: ["team-3"]
  workflow_dispatch:

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: ci
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
      REPO_URL: https://github.com/Greatjobson/sre-final.git

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ FIX: printf сохраняет переносы строк корректно
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          # Проверка ключа
          ssh-keygen -y -f ~/.ssh/id_ed25519

      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          pip3 install ansible-core

      # ✅ FIX: убраны лишние пробелы в ini (ansible их не любит)
      - name: Generate inventory
        run: |
          cat > ansible/inventory.ci.ini <<EOF
          [sre_nodes]
          sre-vm ansible_host=$DEPLOY_HOST ansible_user=$DEPLOY_USER ansible_ssh_private_key_file=~/.ssh/id_ed25519

          [sre_nodes:vars]
          ansible_python_interpreter=/usr/bin/python3
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Ping host via Ansible
        run: ansible -i ansible/inventory.ci.ini all -m ping

      - name: Run Ansible playbook
        run: |
          ansible-playbook -i ansible/inventory.ci.ini ansible/playbook.yml \
            -e repo_url="$REPO_URL" \
            -e repo_version="team-3"

      # ✅ Деплой: pull + kubectl apply
      - name: Deploy via SSH
        run: |
          APP_DIR="${DEPLOY_APP_DIR:-/opt/clothes-store}"
          ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" << EOF
            set -e
            cd "$APP_DIR"

            echo "==> Git pull branch team-3"
            git fetch origin
            git checkout team-3
            git pull origin team-3

            echo "==> Build Docker images"
            sudo docker compose build

            echo "==> Push images (если есть registry)"
            # sudo docker compose push

            echo "==> Kubernetes apply"
            kubectl apply -f k8s/

            echo "==> Rollout status"
            kubectl rollout status deployment/order-service -n default --timeout=120s

            echo "==> Health check"
            kubectl get pods -n default | grep order-service
          EOF