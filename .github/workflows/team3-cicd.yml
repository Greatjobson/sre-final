name: Team-3 CI/CD

on:
  push:
    branches: ["team-3"]
  workflow_dispatch:

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: ci

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
      REPO_URL: https://github.com/${{ github.repository }}.git
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_USER:?DEPLOY_USER is required}"
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY is required}"
          : "${JWT_SECRET:?JWT_SECRET is required}"
          : "${POSTGRES_DB:?POSTGRES_DB is required}"
          : "${POSTGRES_USER:?POSTGRES_USER is required}"
          : "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
          : "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}"

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

      - name: Deploy via SSH
        run: |
          set -euo pipefail
          APP_DIR="${DEPLOY_APP_DIR:-/opt/clothes-store}"

          # Передаём все секреты через env переменные SSH сессии
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o SendEnv=APP_JWT_SECRET \
            -o SendEnv=APP_POSTGRES_DB \
            -o SendEnv=APP_POSTGRES_USER \
            -o SendEnv=APP_POSTGRES_PASSWORD \
            -o SendEnv=APP_GRAFANA_ADMIN_PASSWORD \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            APP_DIR="$APP_DIR" \
            REPO_URL="$REPO_URL" \
            APP_JWT_SECRET="$JWT_SECRET" \
            APP_POSTGRES_DB="$POSTGRES_DB" \
            APP_POSTGRES_USER="$POSTGRES_USER" \
            APP_POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            APP_GRAFANA_ADMIN_PASSWORD="$GRAFANA_ADMIN_PASSWORD" \
            bash << 'EOF'

            set -euo pipefail

            # ── Директория и репозиторий ────────────────────────────────────
            if [ ! -d "$APP_DIR" ]; then
              echo "==> Creating app directory: $APP_DIR"
              sudo mkdir -p "$APP_DIR"
              sudo chown "$USER:$USER" "$APP_DIR"
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "==> Cloning repository into $APP_DIR"
              git clone --branch team-3 --single-branch "$REPO_URL" "$APP_DIR"
            fi

            echo "==> Fixing repository permissions"
            sudo chown -R "$USER:$USER" "$APP_DIR"

            cd "$APP_DIR"

            echo "==> Git update"
            git fetch --prune origin
            git checkout team-3
            git pull --ff-only origin team-3

            # ── Kubernetes секреты ──────────────────────────────────────────
            echo "==> Apply namespace first"
            kubectl apply -f k8s/namespace.yaml

            echo "==> Upsert app-secrets in Kubernetes"
            # kubectl create/apply не умеет обновлять секреты идемпотентно,
            # поэтому используем --from-literal + dry-run | apply — это безопасно
            kubectl create secret generic app-secrets \
              --namespace=clothes-store \
              --from-literal=JWT_SECRET="$APP_JWT_SECRET" \
              --from-literal=POSTGRES_DB="$APP_POSTGRES_DB" \
              --from-literal=POSTGRES_USER="$APP_POSTGRES_USER" \
              --from-literal=POSTGRES_PASSWORD="$APP_POSTGRES_PASSWORD" \
              --from-literal=GRAFANA_ADMIN_PASSWORD="$APP_GRAFANA_ADMIN_PASSWORD" \
              --dry-run=client -o yaml | kubectl apply -f -

            # ── Docker build ────────────────────────────────────────────────
            echo "==> Build Docker images"
            sudo docker compose build \
              auth-service \
              product-service \
              order-service \
              user-service \
              chat-service \
              notification-service \
              frontend

            # ── Импорт образов в containerd (k3s) ──────────────────────────
            echo "==> Import images into k3s/containerd"
            for img in \
              clothes-store-auth-service:latest \
              clothes-store-product-service:latest \
              clothes-store-order-service:latest \
              clothes-store-user-service:latest \
              clothes-store-chat-service:latest \
              clothes-store-notification-service:latest \
              clothes-store-frontend:latest; do

              echo "  Importing $img"
              f="/tmp/${img//[:\/]/_}.tar"
              sudo docker save "$img" -o "$f"
              sudo ctr -n k8s.io images import "$f"
              sudo rm -f "$f"
            done

            # ── Kubernetes манифесты ────────────────────────────────────────
            echo "==> Apply Kubernetes manifests"
            kubectl apply -f k8s/app-stack.yaml
            kubectl apply -f k8s/monitoring.yaml

            # ── Rollout ─────────────────────────────────────────────────────
            echo "==> Restart deployments"
            for svc in auth-service product-service order-service user-service chat-service notification-service frontend; do
              kubectl rollout restart deployment/$svc -n clothes-store
            done

            echo "==> Waiting for rollouts to complete"
            for svc in auth-service product-service order-service user-service chat-service notification-service frontend; do
              echo "  Waiting: $svc"
              kubectl rollout status deployment/$svc -n clothes-store --timeout=180s
            done

            echo "==> Current pods"
            kubectl get pods -n clothes-store

          EOF