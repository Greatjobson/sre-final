apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: clothes-store
type: Opaque
stringData:
  JWT_SECRET: replace_with_strong_random_secret
  POSTGRES_DB: clothes_store
  POSTGRES_USER: clothes
  POSTGRES_PASSWORD: replace_with_strong_postgres_password
  GRAFANA_ADMIN_PASSWORD: admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: clothes-store
data:
  FRONTEND_ORIGIN: "*"
  MONGODB_URI: mongodb://mongo:27017
  NATS_URL: nats://nats:4222
  AUTH_SERVICE_URL: http://auth-service:8082
  PRODUCT_SERVICE_URL: http://product-service:8083
  ORDER_SERVICE_URL: http://order-service:8084
  USER_SERVICE_URL: http://user-service:8085
  CHAT_SERVICE_URL: http://chat-service:8086
  ANALYTICS_SERVICE_URL: http://order-service:8084
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: clothes-store
data:
  nginx.conf: |
    events {}

    http {
        upstream frontend_upstream { server frontend:8081; }
        upstream auth_upstream { server auth-service:8082; }
        upstream product_upstream { server product-service:8083; }
        upstream order_upstream { server order-service:8084; }
        upstream user_upstream { server user-service:8085; }
        upstream chat_upstream { server chat-service:8086; }
        upstream notification_upstream { server notification-service:8087; }

        server {
            listen 80;
            server_name _;
            client_max_body_size 20m;

            location = /health {
                access_log off;
                default_type application/json;
                return 200 '{"status":"ok","service":"gateway"}';
            }

            location /auth { proxy_pass http://auth_upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
            location /api/product { proxy_pass http://product_upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
            location /orders { proxy_pass http://order_upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
            location /api/users { proxy_pass http://user_upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
            location /api/analytics { proxy_pass http://order_upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
            location /chat { proxy_pass http://chat_upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
            location /notifications { proxy_pass http://notification_upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
            location / { proxy_pass http://frontend_upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
        }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-data
  namespace: clothes-store
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: clothes-store
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: clothes-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-data
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: clothes-store
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: clothes-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: app-secrets
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: clothes-store
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: clothes-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-m", "8222"]
          ports:
            - containerPort: 4222
            - containerPort: 8222
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: clothes-store
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: clothes-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: clothes_store_final_v10-auth-service:latest
          imagePullPolicy: IfNotPresent
          command: ["/app/bin/auth-service"]
          env:
            - name: BACKEND_PORT
              value: "8082"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          ports:
            - containerPort: 8082
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: clothes-store
spec:
  selector:
    app: auth-service
  ports:
