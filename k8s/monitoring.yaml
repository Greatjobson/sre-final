apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: clothes-store
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: frontend
        metrics_path: /metrics
        static_configs:
          - targets: ["frontend:8081"]
      - job_name: auth-service
        metrics_path: /metrics
        static_configs:
          - targets: ["auth-service:8082"]
      - job_name: product-service
        metrics_path: /metrics
        static_configs:
          - targets: ["product-service:8083"]
      - job_name: order-service
        metrics_path: /metrics
        static_configs:
          - targets: ["order-service:8084"]
      - job_name: user-service
        metrics_path: /metrics
        static_configs:
          - targets: ["user-service:8085"]
      - job_name: chat-service
        metrics_path: /metrics
        static_configs:
          - targets: ["chat-service:8086"]
      - job_name: notification-service
        metrics_path: /metrics
        static_configs:
          - targets: ["notification-service:8087"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: clothes-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: clothes-store
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: clothes-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GRAFANA_ADMIN_PASSWORD
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: clothes-store
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
