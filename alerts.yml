groups:
  - name: app_alerts
    rules:

      # WARNING — high latency
      - alert: HighLatencyWarning
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High latency warning"
          description: "p95 latency is above 500ms"

      # CRITICAL — high error rate
      - alert: HighErrorRateCritical
        expr: rate(http_requests_total{status=~"5.."}[1m]) / rate(http_requests_total[1m]) * 100 > 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate"
          description: "Error rate is above 10%"

      # CRITICAL — service target is down
      - alert: ServiceDown
        expr: up{job=~"frontend|auth-service|product-service|order-service|user-service|chat-service|notification-service"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Service target is down"
          description: "{{ $labels.job }} has been unreachable for more than 30 seconds"

      # CRITICAL — high CPU usage
      - alert: HighCPUUsageCritical
        expr: (1 - avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 80
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for more than 5 minutes on {{ $labels.instance }}"

      # WARNING — restart loop indicator
      - alert: ServiceRestartLoopWarning
        expr: changes(process_start_time_seconds{job=~"frontend|auth-service|product-service|order-service|user-service|chat-service|notification-service"}[10m]) > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Service restart loop warning"
          description: "{{ $labels.job }} restarted multiple times in the last 10 minutes"
